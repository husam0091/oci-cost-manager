name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q .

      - name: Security response leak gates
        run: |
          ! rg -n "\"(oci_key_content|oci_key_file|oci_pass_phrase|oci_config_file)\"\\s*:" src/backend/api/routes
          ! rg -n "-----BEGIN|PRIVATE KEY" src/backend/api/routes src/frontend/src/services

      - name: Run tests
        env:
          PYTHONPATH: src/backend
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found, skipping pytest."
          fi

  compose-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose build
        run: docker compose build
